<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al Mare Signage - Updated Assets</title>
    <link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Poppins:wght@900&family=Roboto+Slab:wght@300;500&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Corben:wght@400;700&family=Damion&family=Monomakh&family=Ole&family=Pacifico&family=Titan+One&family=Yellowtail&display=swap" rel="stylesheet">
    <style>
        :root {
            --font-brand: 'Alex Brush', cursive;
            --font-h1: 'Poppins', sans-serif;
            --font-h2: 'Roboto Slab', serif;
            --hd-width: 1920px;
            --hd-height: 1080px;
            --color-1: #4669ab;
            --color-2: #7a3db8;
            --color-3: #1e88e5;
            --price-navy: #1a2a4a; 
        }

        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            background-color: #000;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
        }

        #main-container {
            width: var(--hd-width); height: var(--hd-height);
            position: absolute;
            overflow: hidden;
            transform-origin: center center;
            backface-visibility: hidden;
        }

        .slide {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            opacity: 0;
            transition: opacity 1s linear;
            background-repeat: no-repeat;
            background-size: auto 100%; 
            will-change: opacity;
        }

        .slide.active { opacity: 1; z-index: 10; }

        /* Slide Specific Backgrounds & Positions */
        #slide-pizza { 
            --current-bg: var(--color-1); 
            background-image: url('https://i.postimg.cc/y8zp7LTy/pizza.jpg'); 
            background-position: 200% center; 
        }
        #slide-crepes { 
            --current-bg: var(--color-2); 
            background-image: url('https://i.postimg.cc/kgdY7TyN/crepes.jpg'); 
            background-position: 100% center; 
        }
        #slide-icecream { 
            --current-bg: var(--color-3); 
            background-image: url('https://i.postimg.cc/rwLZqf9C/icecream.jpg'); 
            background-position: 250% center; 
        }

        /* BIGGER PIZZA */
        #slide-pizza h1 { font-size: 580px; line-height: 0.8; }

         #slide-crepes h1 { font-size: 310px; line-height: 0.8; }

          #slide-icecream h1 { font-size: 340px; line-height: 0.8; }

        .content-overlay {
            width: 90%; height: 100%;
            background: linear-gradient(to right, var(--current-bg) 55%, rgba(0,0,0,0) 95%);
            padding: 100px 0 0 60px;
            display: flex; flex-direction: column;
            color: white; z-index: 15;
            box-sizing: border-box;
        }

        
        /* Animations */
        .brand-name, h1, h2, .badge-wrapper { opacity: 0; }
        .active .brand-name { animation: fadeIn 0.6s ease forwards 0.9s, fadeOut 0.4s ease forwards 4.4s; }
        .active h1 { animation: fadeIn 0.6s ease forwards 0.5s, fadeOut 0.4s ease forwards 4.5s; }
        .active h2 { animation: fadeIn 0.6s ease forwards 0.7s, fadeOut 0.4s ease forwards 4.6s; }
        .active .badge-wrapper { animation: fadeIn 0.6s ease forwards 0.8s, fadeOut 0.4s ease forwards 4.7s; }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translate3d(0, -30px, 0); }
            to { opacity: 1; transform: translate3d(0, 0, 0); }
        }

        @keyframes fadeOut {
            from { opacity: 1; transform: translate3d(0, 0, 0); }
            to { opacity: 0; transform: translate3d(0, 30px, 0); }
        }

        .brand-name { font-family: var(--font-brand); padding-left: 30px;font-size: 30px; margin-bottom: -10px; }
        h1 { font-family: var(--font-h1); padding-left: -60px; font-size: 280px; margin: 0; line-height: 0.85; text-transform: uppercase; font-weight: 900; }
        h2 { font-family: var(--font-h2); font-size: 48px; padding-left: 25px; max-width: 550px; line-height: 1.2; margin-top: 10px; font-weight: 400; }

        .badge-wrapper {
            position: absolute; bottom: 120px; left: 680px;
            width: 400px; height: 400px;
            display: flex; align-items: center; justify-content: center;
        }

       /* The parent container must be relative */
.slide-container {
    position: relative;
    width: 1920px; /* Standard Full HD width */
    height: 1080px; /* Standard Full HD height */
    overflow: hidden;
}


.brand-name {
    position: absolute;
    bottom: 90px;  /* Distance from the bottom edge */
    right: 1420px;   /* Distance from the right edge */
    margin: 0;
    z-index: 10;   /* Ensures it stays above background images */
    
    /* Optional: keep it small and elegant */
    font-size: 120px;
     font-family: "Yellowtail", cursive;
  font-weight: 400;
  font-style: normal;
    text-shadow: 0 0 1px rgba(0, 0, 0, 0.352);
}


        .png-badge {
            position: absolute; width: 100%; height: 100%;
            /* USE YOUR price-shape.png HERE */
            background: url('https://i.postimg.cc/XY7t2JXB/price_shape.png') no-repeat center center;
            background-size: contain;
            animation: rotateFull 40s linear infinite; /* Slower for TV smoothness */
            will-change: transform;
        }

        @keyframes rotateFull { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .price-text {
            position: relative; z-index: 5;
            color: var(--price-navy); /* Fixed visibility issue */
            font-family: var(--font-h1); font-size: 230px; font-weight: 900;
            font-style: regular;
            display: flex; align-items: baseline;
            text-shadow: 0 2px 10px rgba(17, 32, 94, 0);
        }
        .price-text span { font-size: 120px; margin-left: 5px; }

    </style>
</head>
<body>

    <div id="main-container">
        <p class="brand-name">Al Mare</p>
        <div class="slide active" id="slide-pizza">
            <div class="content-overlay">
                <div class="brand-name">Al Mare</div>
                <h1>PIZZA</h1>
                <h2>Brza, ukusna i idealna kad ti se jede nešto dobro, bez čekanja.</h2>
                <div class="badge-wrapper">
                    <div class="png-badge"></div>
                    <div class="price-text">3<span>€</span></div>
                </div>
            </div>
        </div>

        <div class="slide" id="slide-crepes">
            <div class="content-overlay">
                <div class="brand-name">Al Mare</div>
                <h1>PALAČINKE</h1>
                <h2>Slatke i slane, savršene za svaku priliku, sa prelivom po izboru.</h2>
                <div class="badge-wrapper">
                    <div class="png-badge"></div>
                    <div class="price-text">4<span>€</span></div>
                </div>
            </div>
        </div>

        <div class="slide" id="slide-icecream">
            <div class="content-overlay">
                <div class="brand-name">Al Mare</div>
                <h1>SLADOLED</h1>
                <h2>Osvežavajući užitak u raznim ukusima, savršen kraj obroka.</h2>
                <div class="badge-wrapper">
                    <div class="png-badge"></div>
                    <div class="price-text">2<span>€</span></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function scaleToFit() {
            const container = document.getElementById('main-container');
            const scale = Math.max(window.innerWidth / 1920, window.innerHeight / 1080);
            container.style.transform = `scale(${scale})`;
        }
        window.addEventListener('resize', scaleToFit);
        scaleToFit();

        const slides = document.querySelectorAll('.slide');
        let currentSlide = 0;
        setInterval(() => {
            slides[currentSlide].classList.remove('active');
            currentSlide = (currentSlide + 1) % slides.length;
            slides[currentSlide].classList.add('active');
        }, 5000);
    </script>
</body>
</html>
